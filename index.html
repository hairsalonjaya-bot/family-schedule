<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#4f46e5">
<title>家族スケジュール</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
  :root{
    --blue:#3b82f6; --pink:#ec4899; --green:#22c55e; --orange:#f97316; --purple:#a855f7;
    --bg:#f5f5f7; --card:#ffffff; --ink:#1f2333; --sub:#6b7280; --line:#e5e7eb; --accent:#4f46e5;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; font-family:'Hiragino Sans','Noto Sans JP',sans-serif; background:var(--bg); color:var(--ink); padding-bottom:90px;}
  header{position:sticky; top:0; z-index:20; background:var(--accent); color:#fff; padding:14px 16px 10px;}
  header .row{display:flex; align-items:center; justify-content:space-between;}
  header h1{font-size:17px; margin:0; font-weight:700;}
  header button.icon{background:rgba(255,255,255,.18); border:none; color:#fff; border-radius:10px; width:36px; height:36px; font-size:17px; cursor:pointer;}
  .month-nav{display:flex; align-items:center; justify-content:center; gap:16px; margin-top:10px;}
  .month-nav button{background:rgba(255,255,255,.18); border:none; color:#fff; width:32px; height:32px; border-radius:8px; font-size:16px; cursor:pointer;}
  .month-nav .label{font-size:16px; font-weight:700; min-width:110px; text-align:center;}
  .filters{display:flex; gap:6px; overflow-x:auto; padding:10px 16px 4px; -webkit-overflow-scrolling:touch;}
  .chip{flex:0 0 auto; padding:6px 12px; border-radius:999px; font-size:12.5px; font-weight:600; border:1.5px solid transparent; cursor:pointer; background:#eef0ff; color:#4b4f66; white-space:nowrap;}
  .chip.active{color:#fff;}
  main{padding:8px 10px 20px;}
  .cal{background:var(--card); border-radius:16px; padding:8px 6px 12px; box-shadow:0 1px 3px rgba(0,0,0,.06);}
  .wd-row{display:grid; grid-template-columns:repeat(7,1fr); text-align:center; font-size:11.5px; color:var(--sub); padding:4px 0 6px;}
  .wd-row div:first-child{color:#ef4444;}
  .wd-row div:last-child{color:#3b82f6;}
  .grid{display:flex; flex-direction:column; gap:2px;}
  .week{position:relative; display:grid; grid-template-columns:repeat(7,1fr); grid-auto-rows:min-content; gap:2px 3px; padding-bottom:4px;}
  .col-highlight{border-radius:8px; z-index:0;}
  .col-highlight.selected{background:#eef0ff;}
  .col-highlight.today{box-shadow:inset 0 0 0 1.5px var(--accent); border-radius:8px;}
  .daynum-cell{grid-row:1; padding:3px 4px 0; cursor:pointer; z-index:1;}
  .daynum-cell.out{opacity:.35;}
  .dnum{font-size:12px; font-weight:700; color:var(--ink); display:inline-block; padding:1px 5px; border-radius:6px;}
  .daynum-cell.sun .dnum{color:#ef4444;} .daynum-cell.sat .dnum{color:#3b82f6;}
  .band{font-size:9px; border-radius:4px; padding:2px 4px; color:#fff; margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0; cursor:pointer; z-index:1;}
  .band.no-left-round{border-top-left-radius:0; border-bottom-left-radius:0;}
  .band.no-right-round{border-top-right-radius:0; border-bottom-right-radius:0;}

  .panel{background:var(--card); border-radius:16px; margin-top:10px; padding:14px; box-shadow:0 1px 3px rgba(0,0,0,.06);}
  .panel h2{font-size:14px; margin:0 0 10px;}
  .ev-item{display:flex; align-items:center; gap:8px; padding:9px 6px; border-bottom:1px solid var(--line);}
  .ev-item:last-child{border-bottom:none;}
  .ev-color{width:8px; height:8px; border-radius:50%; flex:0 0 auto;}
  .ev-body{flex:1; min-width:0;}
  .ev-title{font-size:13.5px; font-weight:700;}
  .ev-meta{font-size:11.5px; color:var(--sub);}
  .ev-item button{background:none; border:none; color:var(--sub); font-size:15px; padding:4px 6px; cursor:pointer;}
  .empty{color:var(--sub); font-size:12.5px; text-align:center; padding:14px 0;}

  .fab{position:fixed; right:18px; bottom:22px; width:56px; height:56px; border-radius:50%; background:var(--accent); color:#fff; border:none; font-size:26px; box-shadow:0 4px 14px rgba(79,70,229,.4); cursor:pointer; z-index:30;}

  .sheet-bg{position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:50; display:none; align-items:flex-end;}
  .sheet-bg.show{display:flex;}
  .sheet{background:#fff; width:100%; max-height:88vh; overflow-y:auto; border-radius:18px 18px 0 0; padding:16px 16px 26px;}
  .sheet h2{margin:0 0 12px; font-size:15.5px;}
  .field{margin-bottom:12px;}
  .field label{display:block; font-size:12px; color:var(--sub); margin-bottom:5px; font-weight:600;}
  .field input[type=text], .field input[type=date], .field input[type=time], .field textarea, .field select, .field textarea.mono{
    width:100%; padding:10px 11px; border:1.5px solid var(--line); border-radius:10px; font-size:14px; font-family:inherit; background:#fbfbfd;
  }
  .field textarea{resize:vertical; min-height:52px;}
  .people-grid{display:flex; flex-wrap:wrap; gap:8px;}
  .ptag{border:1.5px solid var(--line); border-radius:10px; padding:8px 12px; font-size:13px; font-weight:600; cursor:pointer; background:#fff; user-select:none;}
  .ptag.on{color:#fff; border-color:transparent;}
  .row2{display:flex; gap:10px;}
  .row2 .field{flex:1;}
  .switch-row{display:flex; align-items:center; justify-content:space-between; padding:10px 2px;}
  .switch-row span{font-size:13px; font-weight:600;}
  .toggle{width:44px; height:26px; border-radius:999px; background:#d1d5db; position:relative; cursor:pointer; flex:0 0 auto;}
  .toggle.on{background:var(--accent);}
  .toggle::after{content:''; position:absolute; width:20px; height:20px; border-radius:50%; background:#fff; top:3px; left:3px; transition:left .15s;}
  .toggle.on::after{left:21px;}
  .btnrow{display:flex; gap:10px; margin-top:16px;}
  .btn{flex:1; padding:12px; border-radius:12px; border:none; font-size:14.5px; font-weight:700; cursor:pointer;}
  .btn.primary{background:var(--accent); color:#fff;}
  .btn.ghost{background:#f1f2f6; color:var(--ink);}
  .btn.danger{background:#fee2e2; color:#dc2626;}
  .btn.work{background:#fce7f3; color:#be185d;}

  .setup-msg{max-width:420px; margin:60px auto; text-align:center; padding:0 24px; color:var(--sub); font-size:13.5px; line-height:1.7;}
  .setup-msg button{margin-top:16px;}
  .toast{position:fixed; left:50%; bottom:100px; transform:translateX(-50%); background:#1f2333; color:#fff; font-size:13px; padding:10px 16px; border-radius:10px; z-index:99; opacity:0; transition:opacity .2s; pointer-events:none;}
  .toast.show{opacity:1;}
</style>
</head>
<body>

<header>
  <div class="row">
    <h1>👨‍👩‍👧‍👦 家族スケジュール</h1>
    <button class="icon" id="btnSettings">⚙️</button>
  </div>
  <div class="month-nav">
    <button id="prevMonth">‹</button>
    <div class="label" id="monthLabel">-</div>
    <button id="nextMonth">›</button>
  </div>
</header>

<div class="filters" id="filters"></div>

<main>
  <div class="cal">
    <div class="wd-row"><div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div></div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="panel">
    <h2 id="dayLabel">今日の予定</h2>
    <div id="dayList"></div>
  </div>
</main>

<button class="fab" id="btnAdd">+</button>

<!-- 予定追加/編集シート -->
<div class="sheet-bg" id="eventSheetBg">
  <div class="sheet">
    <h2 id="eventSheetTitle">予定を追加</h2>
    <div class="field">
      <label>対象メンバー</label>
      <div class="people-grid" id="peoplePicker"></div>
    </div>
    <div class="switch-row">
      <span>💼 香保里の仕事として登録</span>
      <div class="toggle" id="toggleWork"></div>
    </div>
    <div class="field">
      <label>タイトル</label>
      <input type="text" id="fTitle" placeholder="例:凛の授業参観">
    </div>
    <div class="switch-row">
      <span>📅 終日(単日の予定)</span>
      <div class="toggle on" id="toggleAllDay"></div>
    </div>
    <div class="row2">
      <div class="field"><label>開始日</label><input type="date" id="fDate"></div>
      <div class="field" id="endDateField" style="display:none;"><label>終了日</label><input type="date" id="fEndDate"></div>
    </div>
    <div class="row2">
      <div class="field"><label>開始時刻(任意)</label><input type="time" id="fStart"></div>
      <div class="field"><label>終了時刻(任意)</label><input type="time" id="fEnd"></div>
    </div>
    <div class="field">
      <label>メモ</label>
      <textarea id="fMemo" placeholder="持ち物・場所など"></textarea>
    </div>
    <div class="switch-row">
      <span>🔔 前日にLINE通知する</span>
      <div class="toggle on" id="toggleNotify"></div>
    </div>
    <div class="btnrow">
      <button class="btn ghost" id="btnCancelEvent">キャンセル</button>
      <button class="btn danger" id="btnDeleteEvent" style="display:none;">削除</button>
      <button class="btn primary" id="btnSaveEvent">保存</button>
    </div>
  </div>
</div>

<!-- 設定シート -->
<div class="sheet-bg" id="settingsSheetBg">
  <div class="sheet">
    <h2>⚙️ 設定</h2>
    <div class="field">
      <label>Firebase設定(firebaseConfig をそのまま貼り付け)</label>
      <textarea class="mono" id="fbConfigInput" rows="6" placeholder='{"apiKey":"...","projectId":"...", ...}'></textarea>
    </div>
    <div class="field">
      <label>LINE通知用 GAS Web App URL(任意・テスト送信用)</label>
      <input type="text" id="gasUrlInput" placeholder="https://script.google.com/macros/s/xxxx/exec">
    </div>
    <div class="btnrow">
      <button class="btn ghost" id="btnTestLine">🔔 テスト通知を送信</button>
      <button class="btn primary" id="btnSaveSettings">保存して再読み込み</button>
    </div>
    <p style="font-size:11.5px; color:var(--sub); margin-top:14px; line-height:1.6;">
      初回セットアップの手順は setup_guide.txt を参照してください。Firebase設定を保存するとこの端末に記憶され、次回から入力不要です。
    </p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
const PEOPLE = [
  {id:'真一', color:'var(--blue)', hex:'#3b82f6'},
  {id:'香保里', color:'var(--pink)', hex:'#ec4899'},
  {id:'凛', color:'var(--green)', hex:'#22c55e'},
  {id:'新', color:'var(--orange)', hex:'#f97316'},
  {id:'糸', color:'var(--purple)', hex:'#a855f7'},
];
const FAMILY_ID = 'family';
const FAMILY_HEX = '#64748b';
const personHex = id => id === FAMILY_ID ? FAMILY_HEX : (PEOPLE.find(p => p.id === id) || {}).hex || '#9ca3af';

let db = null;
let events = [];
let unsub = null;
let viewYear, viewMonth; // 0-indexed month
let selectedDate = fmtDate(new Date());
let filterPerson = 'all';
let editingId = null;

function fmtDate(d){
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function todayStr(){ return fmtDate(new Date()); }
function fmtShort(dateStr){
  const d = new Date(dateStr + 'T00:00:00');
  return `${d.getMonth()+1}/${d.getDate()}`;
}
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

// ---------- 初期化 ----------
function init(){
  const now = new Date();
  viewYear = now.getFullYear(); viewMonth = now.getMonth();

  renderFilters();
  buildPeoplePicker();

  document.getElementById('prevMonth').onclick = ()=>{ changeMonth(-1); };
  document.getElementById('nextMonth').onclick = ()=>{ changeMonth(1); };
  document.getElementById('btnAdd').onclick = ()=> openEventSheet(null);
  document.getElementById('btnSettings').onclick = openSettingsSheet;
  document.getElementById('btnCancelEvent').onclick = closeEventSheet;
  document.getElementById('btnSaveEvent').onclick = saveEvent;
  document.getElementById('btnDeleteEvent').onclick = deleteCurrentEvent;
  document.getElementById('btnSaveSettings').onclick = saveSettings;
  document.getElementById('btnTestLine').onclick = sendTestLine;
  document.getElementById('toggleWork').onclick = ()=> toggleClass('toggleWork');
  document.getElementById('toggleNotify').onclick = ()=> toggleClass('toggleNotify');
  document.getElementById('toggleAllDay').onclick = ()=>{ toggleClass('toggleAllDay'); updateAllDayUI(); };
  document.getElementById('fDate').oninput = updateAllDayUI;
  document.getElementById('settingsSheetBg').onclick = e=>{ if(e.target.id==='settingsSheetBg') closeSettingsSheet(); };
  document.getElementById('eventSheetBg').onclick = e=>{ if(e.target.id==='eventSheetBg') closeEventSheet(); };

  const cfg = localStorage.getItem('fbConfig');
  const gasUrl = localStorage.getItem('gasUrl') || '';
  document.getElementById('gasUrlInput').value = gasUrl;

  if(!cfg){
    showSetupPrompt();
    return;
  }
  document.getElementById('fbConfigInput').value = cfg;
  startFirebase(cfg);

  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
}

function toggleClass(id){
  document.getElementById(id).classList.toggle('on');
}

function updateAllDayUI(){
  const on = document.getElementById('toggleAllDay').classList.contains('on');
  document.getElementById('endDateField').style.display = on ? 'none' : '';
  if(on){
    document.getElementById('fEndDate').value = document.getElementById('fDate').value;
  }
}

function showSetupPrompt(){
  document.querySelector('main').innerHTML = `
    <div class="setup-msg">
      Firebaseの設定がまだです。<br>
      右上の ⚙️ から firebaseConfig を貼り付けてください。<br>
      手順は setup_guide.txt を参照してください。
      <div><button class="btn primary" id="btnGoSetup" style="width:auto; padding:10px 20px;">⚙️ 設定を開く</button></div>
    </div>`;
  document.getElementById('btnGoSetup').onclick = openSettingsSheet;
}

function startFirebase(cfgStr){
  try{
    const cfg = JSON.parse(cfgStr);
    if(!firebase.apps.length) firebase.initializeApp(cfg);
    db = firebase.firestore();
    try{ db.enablePersistence({synchronizeTabs:true}); }catch(e){}
    subscribeEvents();
  }catch(e){
    toast('Firebase設定が正しくありません: ' + e.message);
    showSetupPrompt();
  }
}

function subscribeEvents(){
  if(unsub) unsub();
  unsub = db.collection('events').onSnapshot(snap=>{
    events = snap.docs.map(d=>({id:d.id, ...d.data()}));
    renderMonth();
    renderDayList();
  }, err=>{
    toast('データ取得エラー: ' + err.message);
  });
}

// ---------- フィルタ ----------
function renderFilters(){
  const wrap = document.getElementById('filters');
  const items = [{id:'all', label:'すべて', hex:'#4f46e5'}, ...PEOPLE.map(p=>({id:p.id, label:p.id, hex:p.hex}))];
  wrap.innerHTML = items.map(p=>`<div class="chip ${filterPerson===p.id?'active':''}" data-id="${p.id}" style="${filterPerson===p.id?`background:${p.hex};`:''}">${p.label}</div>`).join('');
  wrap.querySelectorAll('.chip').forEach(el=>{
    el.onclick = ()=>{ filterPerson = el.dataset.id; renderFilters(); renderMonth(); renderDayList(); };
  });
}

function visibleEvents(){
  if(filterPerson === 'all') return events;
  return events.filter(ev => (ev.people||[]).includes(filterPerson) || (ev.people||[]).includes(FAMILY_ID));
}

function eventsForDay(dateStr){
  return visibleEvents().filter(ev => dateStr >= ev.date && dateStr <= (ev.endDate || ev.date));
}

// ---------- カレンダー描画 ----------
function changeMonth(delta){
  viewMonth += delta;
  if(viewMonth < 0){ viewMonth = 11; viewYear--; }
  if(viewMonth > 11){ viewMonth = 0; viewYear++; }
  renderMonth();
}

function renderMonth(){
  document.getElementById('monthLabel').textContent = `${viewYear}年${viewMonth+1}月`;
  const grid = document.getElementById('grid');
  const firstDow = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const daysInPrev = new Date(viewYear, viewMonth, 0).getDate();
  const totalCells = Math.ceil((firstDow + daysInMonth) / 7) * 7;

  const cells = [];
  for(let i=0;i<totalCells;i++){
    const dayNum = i - firstDow + 1;
    let cellYear = viewYear, cellMonth = viewMonth, cellDay, out = false;
    if(dayNum < 1){ cellDay = daysInPrev + dayNum; cellMonth -= 1; out = true; if(cellMonth<0){cellMonth=11; cellYear--;} }
    else if(dayNum > daysInMonth){ cellDay = dayNum - daysInMonth; cellMonth += 1; out = true; if(cellMonth>11){cellMonth=0; cellYear++;} }
    else { cellDay = dayNum; }
    const dateStr = `${cellYear}-${String(cellMonth+1).padStart(2,'0')}-${String(cellDay).padStart(2,'0')}`;
    cells.push({dateStr, cellDay, out});
  }

  const evs = visibleEvents();
  let html = '';
  for(let w=0; w*7<cells.length; w++){
    const week = cells.slice(w*7, w*7+7);
    const weekStart = week[0].dateStr, weekEnd = week[6].dateStr;
    let weekHtml = '';

    week.forEach((c, col)=>{
      const hlClasses = [];
      if(c.dateStr === todayStr()) hlClasses.push('today');
      if(c.dateStr === selectedDate) hlClasses.push('selected');
      if(hlClasses.length){
        weekHtml += `<div class="col-highlight ${hlClasses.join(' ')}" style="grid-column:${col+1}; grid-row:1/-1;"></div>`;
      }
    });

    week.forEach((c, col)=>{
      const classes = ['daynum-cell'];
      if(c.out) classes.push('out');
      if(col===0) classes.push('sun'); if(col===6) classes.push('sat');
      weekHtml += `<div class="${classes.join(' ')}" data-date="${c.dateStr}" style="grid-column:${col+1}; grid-row:1;"><span class="dnum">${c.cellDay}</span></div>`;
    });

    const segments = [];
    evs.forEach(ev=>{
      const evStart = ev.date, evEnd = ev.endDate || ev.date;
      if(evEnd < weekStart || evStart > weekEnd) return;
      let startCol = week.findIndex(c=>c.dateStr >= evStart);
      if(startCol === -1) startCol = 0;
      let endCol = 0;
      for(let i=0;i<7;i++){ if(week[i].dateStr <= evEnd) endCol = i; }
      segments.push({
        ev, startCol, endCol,
        isActualStart: evStart >= weekStart,
        isActualEnd: evEnd <= weekEnd
      });
    });
    segments.sort((a,b)=> a.startCol - b.startCol || (b.endCol-b.startCol) - (a.endCol-a.startCol) || (a.ev.startTime||'').localeCompare(b.ev.startTime||''));

    const laneEnds = [];
    segments.forEach(seg=>{
      let lane = laneEnds.findIndex(endCol => endCol < seg.startCol);
      if(lane === -1){ lane = laneEnds.length; laneEnds.push(seg.endCol); }
      else { laneEnds[lane] = seg.endCol; }
      seg.lane = lane;
    });

    segments.forEach(seg=>{
      const ev = seg.ev;
      const c = ev.type==='work' ? '#ec4899' : personHex(ev.people && ev.people[0]);
      const cornerClasses = [];
      if(!seg.isActualStart) cornerClasses.push('no-left-round');
      if(!seg.isActualEnd) cornerClasses.push('no-right-round');
      weekHtml += `<div class="band ${cornerClasses.join(' ')}" data-id="${ev.id}" style="grid-column:${seg.startCol+1} / ${seg.endCol+2}; grid-row:${seg.lane+2}; background:${c};">${ev.type==='work'?'💼 ':''}${escapeHtml(ev.title||'')}</div>`;
    });

    html += `<div class="week">${weekHtml}</div>`;
  }
  grid.innerHTML = html;
  grid.querySelectorAll('.daynum-cell').forEach(el=>{
    el.onclick = ()=>{ selectedDate = el.dataset.date; renderMonth(); renderDayList(); };
  });
  grid.querySelectorAll('.band').forEach(el=>{
    el.onclick = ()=>{ openEventSheet(el.dataset.id); };
  });
}

function renderDayList(){
  const d = new Date(selectedDate + 'T00:00:00');
  document.getElementById('dayLabel').textContent = `${d.getMonth()+1}月${d.getDate()}日(${['日','月','火','水','木','金','土'][d.getDay()]})の予定`;
  const list = eventsForDay(selectedDate).sort((a,b)=>(a.startTime||'').localeCompare(b.startTime||''));
  const wrap = document.getElementById('dayList');
  if(list.length===0){ wrap.innerHTML = `<div class="empty">予定はありません</div>`; return; }
  wrap.innerHTML = list.map(ev=>{
    const c = ev.type==='work' ? '#ec4899' : personHex(ev.people && ev.people[0]);
    const time = ev.startTime ? `${ev.startTime}${ev.endTime? '〜'+ev.endTime:''}` : '終日';
    const people = (ev.people||[]).join('・');
    const range = (ev.endDate && ev.endDate !== ev.date) ? `${fmtShort(ev.date)}〜${fmtShort(ev.endDate)} ・ ` : '';
    return `<div class="ev-item" data-id="${ev.id}">
      <div class="ev-color" style="background:${c}"></div>
      <div class="ev-body">
        <div class="ev-title">${ev.type==='work'?'💼 ':''}${escapeHtml(ev.title||'')}</div>
        <div class="ev-meta">${range}${time} ・ ${escapeHtml(people)}${ev.memo?' ・ '+escapeHtml(ev.memo):''}</div>
      </div>
      <button data-edit="${ev.id}">✏️</button>
    </div>`;
  }).join('');
  wrap.querySelectorAll('[data-edit]').forEach(btn=>{
    btn.onclick = ()=> openEventSheet(btn.dataset.edit);
  });
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ---------- 予定追加/編集 ----------
function buildPeoplePicker(){
  const wrap = document.getElementById('peoplePicker');
  const items = [...PEOPLE, {id:FAMILY_ID, hex:FAMILY_HEX}];
  wrap.innerHTML = items.map(p=>`<div class="ptag" data-id="${p.id}" data-hex="${p.hex}">${p.id}</div>`).join('');
  wrap.querySelectorAll('.ptag').forEach(el=>{
    el.onclick = ()=>{
      el.classList.toggle('on');
      el.style.background = el.classList.contains('on') ? el.dataset.hex : '#fff';
      el.style.borderColor = el.classList.contains('on') ? el.dataset.hex : '';
    };
  });
}

function openEventSheet(id){
  editingId = id;
  const ev = id ? events.find(e=>e.id===id) : null;
  document.getElementById('eventSheetTitle').textContent = ev ? '予定を編集' : '予定を追加';
  document.getElementById('btnDeleteEvent').style.display = ev ? 'block' : 'none';

  document.querySelectorAll('#peoplePicker .ptag').forEach(el=>{
    const on = ev ? (ev.people||[]).includes(el.dataset.id) : false;
    el.classList.toggle('on', on);
    el.style.background = on ? el.dataset.hex : '#fff';
    el.style.borderColor = on ? el.dataset.hex : '';
  });
  document.getElementById('toggleWork').classList.toggle('on', ev ? ev.type==='work' : false);
  document.getElementById('toggleNotify').classList.toggle('on', ev ? !!ev.notify : true);
  document.getElementById('fTitle').value = ev ? (ev.title||'') : '';
  document.getElementById('fDate').value = ev ? ev.date : selectedDate;
  document.getElementById('fEndDate').value = ev ? (ev.endDate || ev.date) : selectedDate;
  document.getElementById('fStart').value = ev ? (ev.startTime||'') : '';
  document.getElementById('fEnd').value = ev ? (ev.endTime||'') : '';
  document.getElementById('fMemo').value = ev ? (ev.memo||'') : '';

  const isMultiDay = !!(ev && ev.endDate && ev.endDate !== ev.date);
  document.getElementById('toggleAllDay').classList.toggle('on', !isMultiDay);
  updateAllDayUI();

  document.getElementById('eventSheetBg').classList.add('show');
}
function closeEventSheet(){
  document.getElementById('eventSheetBg').classList.remove('show');
}

function saveEvent(){
  if(!db){ toast('先にFirebaseを設定してください'); return; }
  const people = [...document.querySelectorAll('#peoplePicker .ptag.on')].map(el=>el.dataset.id);
  const isWork = document.getElementById('toggleWork').classList.contains('on');
  const title = document.getElementById('fTitle').value.trim() || (isWork ? '仕事' : '');
  const date = document.getElementById('fDate').value;
  const allDay = document.getElementById('toggleAllDay').classList.contains('on');
  const endDate = allDay ? date : (document.getElementById('fEndDate').value || date);

  if(people.length===0 && !isWork){ toast('対象メンバーを選んでください'); return; }
  if(!date){ toast('日付を入力してください'); return; }
  if(!title){ toast('タイトルを入力してください'); return; }
  if(!allDay && endDate < date){ toast('終了日は開始日より後にしてください'); return; }

  const finalPeople = isWork ? Array.from(new Set(['香保里', ...people])) : people;

  const data = {
    people: finalPeople,
    type: isWork ? 'work' : 'event',
    title,
    date,
    endDate,
    startTime: document.getElementById('fStart').value || '',
    endTime: document.getElementById('fEnd').value || '',
    memo: document.getElementById('fMemo').value.trim(),
    notify: document.getElementById('toggleNotify').classList.contains('on'),
  };

  const promise = editingId
    ? db.collection('events').doc(editingId).update(data)
    : db.collection('events').add({...data, createdAt: firebase.firestore.FieldValue.serverTimestamp()});

  promise.then(()=>{
    closeEventSheet();
    toast('保存しました');
  }).catch(err=> toast('保存に失敗しました: ' + err.message));
}

function deleteCurrentEvent(){
  if(!editingId) return;
  if(!confirm('この予定を削除しますか?')) return;
  db.collection('events').doc(editingId).delete().then(()=>{
    closeEventSheet();
    toast('削除しました');
  }).catch(err=> toast('削除に失敗しました: ' + err.message));
}

// ---------- 設定 ----------
function openSettingsSheet(){
  document.getElementById('settingsSheetBg').classList.add('show');
}
function closeSettingsSheet(){
  document.getElementById('settingsSheetBg').classList.remove('show');
}
function saveSettings(){
  const cfgStr = document.getElementById('fbConfigInput').value.trim();
  const gasUrl = document.getElementById('gasUrlInput').value.trim();
  if(!cfgStr){ toast('firebaseConfigを入力してください'); return; }
  try{
    JSON.parse(cfgStr);
  }catch(e){
    toast('JSON形式が正しくありません'); return;
  }
  localStorage.setItem('fbConfig', cfgStr);
  localStorage.setItem('gasUrl', gasUrl);
  location.reload();
}
function sendTestLine(){
  const gasUrl = document.getElementById('gasUrlInput').value.trim();
  if(!gasUrl){ toast('GAS Web App URLを入力してください'); return; }
  toast('送信中...');
  fetch(gasUrl, {method:'POST', headers:{'Content-Type':'text/plain'}, body: JSON.stringify({action:'test'})})
    .then(r=>r.json())
    .then(res=> toast(res.message || res.error || '送信しました'))
    .catch(err=> toast('送信に失敗しました: ' + err.message));
}

init();
